name: Build and push images

# Builds the container images and pushes them to the GitHub Container Registry
# (GHCR) so a Portainer stack can pull them by URL. No secrets are required:
# the workflow authenticates with the built-in GITHUB_TOKEN.
#
# Published images (for the repo owner "OWNER"):
#   ghcr.io/OWNER/workout-agent-web   <- the dashboard used by the Portainer stack
#   ghcr.io/OWNER/workout-agent       <- the daily agent (optional)

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'Dockerfile.web'
      - 'docker-entrypoint.sh'
      - 'webapp/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: workout-agent-web
            dockerfile: Dockerfile.web
          - image: workout-agent
            dockerfile: Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
