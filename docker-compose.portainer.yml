# Portainer stack — fully automated workout agent + web dashboard
#
# Runs the daily agent (it wakes at RUN_AT every day, builds the plan, syncs
# Hevy routines + Google Health body composition, and messages you on Telegram)
# alongside the read-only web dashboard. Both pull pre-built images from GHCR,
# so the VPS builds nothing.
#
# Deploy in Portainer:
#   Stacks -> Add stack -> Repository (point at this file) OR Web editor (paste).
#   Then add the credentials below under "Environment variables" and Deploy.
#
# CREDENTIALS LIVE ONLY IN PORTAINER, never in git. The compose only references
# variable names (${...}); you supply the values in the stack's env panel.
#
# Required env vars:
#   GEMINI_API_KEY            https://aistudio.google.com/app/apikey
#   TELEGRAM_BOT_TOKEN        from @BotFather
#   TELEGRAM_CHAT_ID          your Telegram chat id
#
# Optional env vars (leave unset to disable that feature):
#   HEVY_API_KEY                    reference your last logged Hevy session
#   GOOGLE_HEALTH_CLIENT_ID         smart-scale body-composition auto-sync
#   GOOGLE_HEALTH_CLIENT_SECRET     (run google_health_auth.py once on your
#   GOOGLE_HEALTH_REFRESH_TOKEN      laptop to obtain the refresh token)
#   RUN_AT (07:00)  TZ (Europe/London)  WEB_PORT (8770)
#   GEMINI_MODEL  HEVY_SYNC_ROUTINES  HEVY_PREFILL_WEIGHTS  CHECKIN_ENABLED
#   LIFESTYLE_ENABLED  SELF_REVIEW_ENABLED  SELF_REVIEW_WEEKDAY  TELEGRAM_PARSE_MODE
services:
  agent:
    image: ghcr.io/elgansayer/workout-agent:latest
    container_name: workout-agent
    environment:
      MODE: schedule
      RUN_AT: ${RUN_AT:-07:00}
      TZ: ${TZ:-Europe/London}
      DATABASE_PATH: /data/workout_agent.db
      # --- Required ---
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # --- Optional integrations ---
      HEVY_API_KEY: ${HEVY_API_KEY:-}
      GOOGLE_HEALTH_CLIENT_ID: ${GOOGLE_HEALTH_CLIENT_ID:-}
      GOOGLE_HEALTH_CLIENT_SECRET: ${GOOGLE_HEALTH_CLIENT_SECRET:-}
      GOOGLE_HEALTH_REFRESH_TOKEN: ${GOOGLE_HEALTH_REFRESH_TOKEN:-}
      # --- Optional toggles (defaults shown) ---
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      HEVY_SYNC_ROUTINES: ${HEVY_SYNC_ROUTINES:-1}
      HEVY_PREFILL_WEIGHTS: ${HEVY_PREFILL_WEIGHTS:-1}
      CHECKIN_ENABLED: ${CHECKIN_ENABLED:-1}
      LIFESTYLE_ENABLED: ${LIFESTYLE_ENABLED:-1}
      SELF_REVIEW_ENABLED: ${SELF_REVIEW_ENABLED:-1}
      SELF_REVIEW_WEEKDAY: ${SELF_REVIEW_WEEKDAY:-Sun}
      TELEGRAM_PARSE_MODE: ${TELEGRAM_PARSE_MODE:-}
    volumes:
      - agent-data:/data
    restart: unless-stopped

  web:
    image: ghcr.io/elgansayer/workout-agent-web:latest
    container_name: workout-agent-web
    environment:
      DATABASE_PATH: /data/workout_agent.db
      TZ: ${TZ:-Europe/London}
      # Enables the "Connect Google Health" button on the dashboard's Settings
      # page, so you can link your account in the browser (no manual token).
      # GOOGLE_HEALTH_REDIRECT_URI must be the dashboard's public callback URL,
      # e.g. https://gym.example.com/google-health/callback, and be registered
      # as an Authorized redirect URI on the Google OAuth client.
      GOOGLE_HEALTH_CLIENT_ID: ${GOOGLE_HEALTH_CLIENT_ID:-}
      GOOGLE_HEALTH_CLIENT_SECRET: ${GOOGLE_HEALTH_CLIENT_SECRET:-}
      GOOGLE_HEALTH_REDIRECT_URI: ${GOOGLE_HEALTH_REDIRECT_URI:-}
    ports:
      - "${WEB_PORT:-8770}:8000"
    volumes:
      # Same volume as the agent, so the dashboard reads live data.
      - agent-data:/data
    restart: unless-stopped

volumes:
  agent-data:
