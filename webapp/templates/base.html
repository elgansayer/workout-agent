<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workout Agent{% block title %}{% endblock %}</title>
    <meta name="theme-color" content="#0f1115">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workout">
    <link rel="manifest" href="{{ static_url('manifest.webmanifest') }}">
    <link rel="icon" href="{{ static_url('icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ static_url('icon.svg') }}">
    <link rel="stylesheet" href="{{ static_url('style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">Workout&nbsp;Agent</a>
        <nav>
            <a href="/" class="{{ 'on' if active == 'today' }}">Today</a>
            <a href="/progress" class="{{ 'on' if active == 'progress' }}">Progress</a>
            <a href="/stats" class="{{ 'on' if active == 'stats' }}">Stats</a>
            <a href="/plan" class="{{ 'on' if active == 'plan' }}">Plan</a>
            <a href="/history" class="{{ 'on' if active == 'history' }}">History</a>
            <a href="/checkins" class="{{ 'on' if active == 'checkins' }}">Check-ins</a>
            <a href="/chat" class="nav-coach {{ 'on' if active == 'chat' }}">✨ Coach</a>
            <a href="/settings" class="{{ 'on' if active == 'settings' }}">Settings</a>
            {% if request.session.get("user") %}
            <a href="/logout">Logout</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="foot">Hybrid Powerbuilding, 12-week periodised cycle.</footer>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js", { scope: "/" }).catch(() => {});
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById("rag-input");
            if (input) {
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") ragSearch();
                });
            }
        });

        async function ragSearch() {
            const query = document.getElementById("rag-input").value.trim();
            if (!query) return;
            const resContainer = document.getElementById("rag-results");
            const resContent = document.getElementById("rag-content");
            resContainer.style.display = "block";
            resContent.innerText = "Investigating...";

            try {
                const response = await fetch(`/api/rag_search?q=${encodeURIComponent(query)}`);
                if (!response.ok) {
                    resContent.innerText = `Error: ${response.status} ${response.statusText}`;
                    return;
                }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                resContent.innerText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    resContent.innerText += decoder.decode(value, {stream: true});
                }
            } catch (err) {
                resContent.innerText = "Failed to reach the server. Please try again.";
            }
        }

        function closeRagResults() {
            document.getElementById("rag-results").style.display = "none";
        }
    </script>
    <div id="rag-results" class="modal-glass ai-glass" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h4 class="ai-gradient-text" style="margin:0;">✨ Log Investigator</h4>
            <button onclick="closeRagResults()" style="background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:0 4px;line-height:1;" title="Close">&times;</button>
        </div>
        <div id="rag-content" style="margin-top:12px;"></div>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
