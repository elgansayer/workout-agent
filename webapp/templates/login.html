<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workout Agent - Sign In</title>
    <link rel="stylesheet" href="{{ static_url('style.css') }}">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-color: var(--border);
        }
        .login-card h1 {
            margin: 0 0 1rem;
            font-size: 1.8rem;
        }
        .login-card p {
            margin-bottom: 2rem;
            font-size: 0.92rem;
        }
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            transition: transform 0.1s ease;
        }
        .google-btn:active {
            transform: scale(0.98);
        }
        .google-icon {
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <h1>Workout Agent</h1>
            <p class="muted">This dashboard is private. Please sign in with your Google account to access your stats.</p>
            <a href="/login/google" class="btn google-btn">
                <svg class="google-icon" width="18" height="18" viewBox="0 0 18 18">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
                    <path d="M3.964 10.707a5.416 5.416 0 010-3.414V4.961H.957a8.997 8.997 0 000 8.078l3.007-2.332z"/>
                    <path d="M9 3.58c1.32 0 2.507.454 3.44 1.354l2.58-2.58C13.463.896 11.427 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z"/>
                </svg>
                Sign in with Google
            </a>
        </div>
    </div>
</body>
</html>
